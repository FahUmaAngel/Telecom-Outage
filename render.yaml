services:
  - type: web
    name: telecom-outage
    runtime: python
    buildCommand: >
      pip install -r backend/requirements.txt &&
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright-browsers playwright install chromium &&
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright-browsers playwright install-deps chromium &&
      cd frontend && npm install && NEXT_OUTPUT_EXPORT=true npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://fahumaangel.github.io
      - key: SECRET_KEY
        sync: false
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: APP_ENV
        value: production
