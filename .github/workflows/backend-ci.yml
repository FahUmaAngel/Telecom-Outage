name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - 'scrapers/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'scrapers/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r scrapers/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 backend/ scrapers/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 backend/ scrapers/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test Docker Build
        run: |
          docker build -t telecom-outage-backend -f backend/Dockerfile .
