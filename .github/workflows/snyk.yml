name: Snyk Security Scan
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt
        
      - name: Snyk Setup
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb # v0.0.8
        
      - name: Snyk Backend Scan
        run: snyk test --file=backend/requirements.txt --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci
        
      - name: Snyk Frontend Scan
        run: snyk test --file=frontend/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
