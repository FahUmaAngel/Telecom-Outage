name: Snyk Security Scan
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install Snyk CLI
        run: npm install -g snyk
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r scrapers/requirements.txt
        
      - name: Snyk Backend Scan
        continue-on-error: true
        run: snyk test --file=backend/requirements.txt --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Scrapers Scan
        continue-on-error: true
        run: snyk test --file=scrapers/requirements.txt --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          
      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci
        
      - name: Snyk Frontend Scan
        continue-on-error: true
        run: snyk test --file=frontend/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

