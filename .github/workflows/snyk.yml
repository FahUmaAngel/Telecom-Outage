name: Snyk Security Scan
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install Snyk CLI
        run: npm install -g snyk
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt
        
      - name: Snyk Backend Scan
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN is missing. Please add it to GitHub Secrets (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          snyk test --file=backend/requirements.txt --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          
      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci
        
      - name: Snyk Frontend Scan
        run: snyk test --file=frontend/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
