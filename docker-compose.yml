version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: telecom_db
    environment:
      - POSTGRES_USER=telecom_user
      - POSTGRES_PASSWORD=telecom_pass
      - POSTGRES_DB=telecom_outage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: telecom_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://telecom_user:telecom_pass@db:5432/telecom_outage
      - SCRAPER_INTERVAL_MINUTES=60
    depends_on:
      - db
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telecom_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
